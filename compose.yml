services:
  postgres:
    image: postgres:16-alpine
    container_name: pompi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pompi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pompi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pompi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pompi_postgres_data: