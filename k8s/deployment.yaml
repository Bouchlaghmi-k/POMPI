apiVersion: apps/v1
kind: Deployment
metadata:
  name: pompi-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pompi
  template:
    metadata:
      labels:
        app: pompi
    spec:
      containers:
        - name: pompi-app
          image: pompi-app:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: pompi